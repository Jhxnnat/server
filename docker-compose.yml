volumes:
  caddy_certs:
  caddy_config:
  caddy_data:
  caddy_sites:
  navidrome_music:
    name: navidrome_music
  miniflux-db:
  radicale_config:
    name: radicale_config
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./radicale_config
  radicale_data:
    name: radicale_data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./radicale_data

